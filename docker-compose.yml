services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: bataille-navale-backend
    restart: unless-stopped
    environment:
      APP_ALLOWED_ORIGINS: "${APP_ALLOWED_ORIGINS:-http://localhost:2462,http://localhost:5173,http://127.0.0.1:2462,http://127.0.0.1:5173,http://72.61.192.139:2462}"
    expose:
      - "4784"

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    container_name: bataille-navale-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-2462}:80"
